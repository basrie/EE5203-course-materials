<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <style>@import url("https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&amp;display=swap");</style>
  <title id="title">Embedded project architecture</title>
  <desc id="desc">A physical quantity is sensed, acquired, processed, and sent to output and communication subsystems.</desc>
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#17384c" flood-opacity="0.15"/></filter>
    <marker id="a" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="userSpaceOnUse"><path d="M0 0 L14 7 L0 14 Z" fill="#4284a5"/></marker>
  </defs>
  <rect width="1400" height="500" rx="30" fill="#f8fafc"/>
  <g filter="url(#s)" font-family="Quicksand,Arial,sans-serif" text-anchor="middle">
    <rect x="30" y="155" width="210" height="145" rx="24" fill="#eef2f5" stroke="#8297a5" stroke-width="3"/>
    <text x="135" y="215" font-size="27" fill="#415967">Physical</text><text x="135" y="252" font-size="27" fill="#415967">quantity</text>
    <rect x="275" y="155" width="190" height="145" rx="24" fill="#e3f0f7" stroke="#4383a5" stroke-width="3"/>
    <text x="370" y="236" font-size="30" font-weight="700" fill="#174f73">SENSOR</text>
    <rect x="500" y="155" width="260" height="145" rx="24" fill="#d8ebf4" stroke="#2b789f" stroke-width="3"/>
    <text x="630" y="215" font-size="27" font-weight="700" fill="#174f73">DATA</text><text x="630" y="252" font-size="27" font-weight="700" fill="#174f73">ACQUISITION</text>
    <rect x="795" y="130" width="270" height="195" rx="28" fill="#174f73"/>
    <text x="930" y="215" font-size="32" font-weight="700" fill="white">PROCESSING</text>
    <text x="930" y="260" font-size="21" fill="#d4eaf4">decide · filter · calculate</text>
    <rect x="1130" y="70" width="240" height="145" rx="24" fill="#fff0dc" stroke="#d47b28" stroke-width="3"/>
    <text x="1250" y="153" font-size="31" font-weight="700" fill="#95511d">OUTPUT</text>
    <rect x="1130" y="285" width="240" height="145" rx="24" fill="#e8f4eb" stroke="#4a8b62" stroke-width="3"/>
    <text x="1250" y="350" font-size="25" font-weight="700" fill="#326747">COMMUNI-</text><text x="1250" y="383" font-size="25" font-weight="700" fill="#326747">CATION</text>
  </g>
  <g stroke="#4284a5" stroke-width="5" fill="none" marker-end="url(#a)">
    <path d="M245 228 H260"/><path d="M470 228 H485"/><path d="M765 228 H780"/>
    <path d="M1070 195 C1100 195 1100 143 1115 143"/><path d="M1070 260 C1100 260 1100 357 1115 357"/>
  </g>
  <text x="700" y="470" text-anchor="middle" font-family="Quicksand,Arial,sans-serif" font-size="25" fill="#526c7c">Every project must define a testable path from input evidence to useful behavior.</text>
</svg>
