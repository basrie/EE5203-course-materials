<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .t { font: 28px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; fill:#0b1220; }
      .h { font: 40px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; font-weight:700; fill:#0b1220; }
      .s { font: 22px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; fill:#0b1220; }
      .axis { stroke:#111827; stroke-width:4; }
      .grid { stroke:#94a3b8; stroke-width:2; opacity:0.35; }
      .curve { stroke:#2563eb; stroke-width:8; fill:none; }
      .bad { stroke:#ef4444; stroke-width:8; fill:none; stroke-dasharray:14 10; }
      .lbl { font: 22px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill:#0b1220; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#ffffff"/>
  <text x="80" y="95" class="h">Stepper Speed: Don’t Jump to High Step Rates</text>
  <text x="80" y="140" class="t">Ramping the step rate prevents missed steps under load.</text>

  <!-- Plot area -->
  <rect x="160" y="230" width="1280" height="600" fill="#f8fafc" stroke="#334155" stroke-width="3" rx="18"/>

  <!-- Grid -->
  <g>
    <line x1="260" y1="740" x2="260" y2="300" class="grid"/>
    <line x1="420" y1="740" x2="420" y2="300" class="grid"/>
    <line x1="580" y1="740" x2="580" y2="300" class="grid"/>
    <line x1="740" y1="740" x2="740" y2="300" class="grid"/>
    <line x1="900" y1="740" x2="900" y2="300" class="grid"/>
    <line x1="1060" y1="740" x2="1060" y2="300" class="grid"/>
    <line x1="1220" y1="740" x2="1220" y2="300" class="grid"/>

    <line x1="240" y1="660" x2="1360" y2="660" class="grid"/>
    <line x1="240" y1="580" x2="1360" y2="580" class="grid"/>
    <line x1="240" y1="500" x2="1360" y2="500" class="grid"/>
    <line x1="240" y1="420" x2="1360" y2="420" class="grid"/>
    <line x1="240" y1="340" x2="1360" y2="340" class="grid"/>
  </g>

  <!-- Axes -->
  <line x1="240" y1="740" x2="1360" y2="740" class="axis"/>
  <line x1="240" y1="740" x2="240" y2="300" class="axis"/>

  <text x="1320" y="785" class="t">time</text>
  <text x="120" y="320" class="t" transform="rotate(-90 120 320)">step rate (steps/s)</text>

  <!-- Good trapezoidal ramp -->
  <path d="M240 740 L460 640 L980 640 L1200 740" class="curve"/>
  <text x="520" y="615" class="s">ramp up → cruise → ramp down</text>

  <!-- Bad jump -->
  <path d="M240 740 L300 420 L520 420" class="bad"/>
  <text x="540" y="430" class="s" style="fill:#b91c1c;">sudden jump can miss steps</text>

  <text x="260" y="820" class="s">Implementation tip: timer tick period changes gradually (acceleration profile).</text>
</svg>

